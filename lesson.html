<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zolalingo - Lesson</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8eaf6);
            min-height: 100vh;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            width: 100%;
        }
        .logo { font-size: 24px; font-weight: bold; color: #7b5ea7; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: #a07bb5; text-decoration: none; font-size: 14px; }
        .nav-links a:hover { color: #7b5ea7; }
        .logout-btn {
            background: none;
            border: 2px solid #d4b8e0;
            border-radius: 10px;
            padding: 6px 16px;
            color: #a07bb5;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Georgia', serif;
        }
        .logout-btn:hover { border-color: #7b5ea7; color: #7b5ea7; }
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            width: 100%;
        }
        .progress-bar-top {
            width: 100%;
            max-width: 700px;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
            height: 8px;
            margin-bottom: 40px;
            overflow: hidden;
        }
        .progress-fill {
            background: #7b5ea7;
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s;
        }
        .word-title {
            font-size: 13px;
            color: #a07bb5;
            margin-bottom: 10px;
            text-align: center;
            font-style: italic;
        }
        .word-main {
            font-size: 52px;
            color: #7b5ea7;
            font-weight: bold;
            text-align: center;
            margin-bottom: 40px;
        }
        .cards-row {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .lang-card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 25px;
            width: 200px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(123,94,167,0.1);
        }
        .lang-card .flag { font-size: 32px; margin-bottom: 10px; }
        .lang-card .lang-name { font-size: 12px; color: #a07bb5; margin-bottom: 8px; }
        .lang-card .translation { font-size: 22px; color: #7b5ea7; font-weight: bold; }
        .lang-card .pronunciation { font-size: 12px; color: #c4a0d4; margin-top: 6px; font-style: italic; }
        .nav-buttons { display: flex; gap: 16px; }
        .nav-btn {
            background: white;
            border: 2px solid #d4b8e0;
            border-radius: 12px;
            padding: 12px 30px;
            font-size: 15px;
            color: #7b5ea7;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Georgia', serif;
        }
        .nav-btn:hover { background: #7b5ea7; color: white; border-color: #7b5ea7; }
        .nav-btn.primary { background: #7b5ea7; color: white; border-color: #7b5ea7; }
        .nav-btn.primary:hover { background: #5a3f7a; }
        .word-counter { color: #a07bb5; font-size: 13px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">Zolalingo</div>
    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="lesson.html">Lessons</a>
        <a href="quiz.html">Quiz</a>
        <a href="profile.html">Profile</a>
        <button class="logout-btn" onclick="window.location.href='index.html'">Log out</button>
    </div>
</div>

<div class="content">
    <div class="progress-bar-top">
        <div class="progress-fill" id="progressFill" style="width: 20%"></div>
    </div>

    <div class="word-counter">Word <span id="current">1</span> of 5</div>
    <div class="word-title">The word in your native language</div>
    <div class="word-main" id="nativeWord">Apple</div>

    <div class="cards-row">
        <div class="lang-card">
            <div class="flag">🇩🇪</div>
            <div class="lang-name">German</div>
            <div class="translation" id="t1">Apfel</div>
            <div class="pronunciation" id="p1">/ ˈap.fəl /</div>
        </div>
        <div class="lang-card">
            <div class="flag">🇫🇷</div>
            <div class="lang-name">French</div>
            <div class="translation" id="t2">Pomme</div>
            <div class="pronunciation" id="p2">/ pɔm /</div>
        </div>
        <div class="lang-card">
            <div class="flag">🇪🇸</div>
            <div class="lang-name">Spanish</div>
            <div class="translation" id="t3">Manzana</div>
            <div class="pronunciation" id="p3">/ man.ˈsa.na /</div>
        </div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" onclick="prevWord()">← Previous</button>
        <button class="nav-btn primary" onclick="nextWord()">Next →</button>
    </div>
</div>

<script>
    const words = [
        { native: "Apple", t1: "Apfel", p1: "/ ˈap.fəl /", t2: "Pomme", p2: "/ pɔm /", t3: "Manzana", p3: "/ man.ˈsa.na /" },
        { native: "Water", t1: "Wasser", p1: "/ ˈvas.ər /", t2: "Eau", p2: "/ o /", t3: "Agua", p3: "/ ˈa.ɣwa /" },
        { native: "House", t1: "Haus", p1: "/ haʊs /", t2: "Maison", p2: "/ mɛ.zɔ̃ /", t3: "Casa", p3: "/ ˈka.sa /" },
        { native: "Book", t1: "Buch", p1: "/ buːx /", t2: "Livre", p2: "/ livʁ /", t3: "Libro", p3: "/ ˈli.βɾo /" },
        { native: "Friend", t1: "Freund", p1: "/ fʁɔʏnt /", t2: "Ami", p2: "/ a.mi /", t3: "Amigo", p3: "/ aˈmi.ɣo /" }
    ];

    let index = 0;

    function updateWord() {
        const w = words[index];
        document.getElementById('nativeWord').textContent = w.native;
        document.getElementById('t1').textContent = w.t1;
        document.getElementById('p1').textContent = w.p1;
        document.getElementById('t2').textContent = w.t2;
        document.getElementById('p2').textContent = w.p2;
        document.getElementById('t3').textContent = w.t3;
        document.getElementById('p3').textContent = w.p3;
        document.getElementById('current').textContent = index + 1;
        document.getElementById('progressFill').style.width = ((index + 1) / words.length * 100) + '%';
    }

    function nextWord() {
        if (index < words.length - 1) {
            index++;
            updateWord();
        } else {
            window.location.href = 'quiz.html';
        }
    }

    function prevWord() {
        if (index > 0) { index--; updateWord(); }
    }
</script>

</body>
</html>
