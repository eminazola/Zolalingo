<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zolalingo - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8eaf6);
            min-height: 100vh;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            color: #7b5ea7;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(123,94,167,0.15);
        }

        .card h2 {
            color: #7b5ea7;
            margin-bottom: 25px;
            font-size: 22px;
            text-align: center;
        }

        .input-group { margin-bottom: 18px; }

        .input-group label {
            display: block;
            color: #a07bb5;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #d4b8e0;
            border-radius: 12px;
            font-size: 14px;
            color: #5a3f7a;
            background: white;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus { border-color: #7b5ea7; }

        .login-btn {
            width: 100%;
            background: #7b5ea7;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .login-btn:hover { background: #5a3f7a; transform: translateY(-2px); }

        .forgot { text-align: right; margin-top: 8px; font-size: 12px; }
        .forgot a { color: #a07bb5; text-decoration: none; }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #a07bb5;
        }

        .register-link a { color: #7b5ea7; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="logo">Zolalingo</div>

<div class="card">
    <h2>Welcome Back</h2>

    <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="your@email.com">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••">
    </div>

    <div class="forgot"><a href="#">Forgot password?</a></div>

    <button class="login-btn" onclick="window.location.href='dashboard.html'">Log In →</button>

    <div class="register-link">
        Don't have an account? <a href="register.html">Sign up</a>
    </div>
</div>

</body>
</html>
